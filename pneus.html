<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRacing Tire Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tipografia de estilo "Racing" / Digital */
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');
        
        /* Forçar transparência máxima para evitar o fundo branco */
        html {
            background: rgba(0, 0, 0, 0) !important;
        }
        body {
            font-family: 'Teko', sans-serif;
            background: rgba(0, 0, 0, 0) !important;
            color: white;
            overflow: hidden; 
            margin: 0;
            padding: 1rem;
        }

        .overlay-container {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border-left: 4px solid #3b82f6;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Área de debug maior e com scroll */
        #debug-log {
            font-family: monospace;
            font-size: 11px;
            /* Scrollbar fininha para ficar bonito */
            scrollbar-width: thin;
            scrollbar-color: #4b5563 transparent;
        }
        #debug-log::-webkit-scrollbar {
            width: 4px;
        }
        #debug-log::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex items-start justify-start h-screen">

    <!-- Caixa Principal do Overlay -->
    <div id="tire-overlay" class="overlay-container rounded-r-xl p-4 w-72 transition-all duration-500 ease-in-out border-l-4 border-yellow-400 flex flex-col">
        
        <!-- Cabeçalho -->
        <div class="flex justify-between items-center mb-3 border-b border-gray-600 pb-2">
            <h1 class="text-2xl font-bold tracking-widest text-gray-300 uppercase">Track Info</h1>
            <div id="connection-status" class="w-3 h-3 rounded-full bg-red-500" title="Estado da Ligação"></div>
        </div>

        <!-- Dados da Pista -->
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-gray-800/50 p-2 rounded">
                <p class="text-gray-400 text-sm uppercase">Pista</p>
                <p id="track-temp" class="text-xl font-semibold">--°C</p>
            </div>
            <div class="bg-gray-800/50 p-2 rounded">
                <p class="text-gray-400 text-sm uppercase">Estado</p>
                <p id="track-wetness" class="text-xl font-semibold text-blue-400">Aguardar...</p>
            </div>
        </div>

        <!-- O Frontend "Inteligente": Recomendação de Pneu -->
        <div class="mt-2 text-center p-3 rounded-lg bg-gray-800/80 border border-gray-600">
            <p class="text-gray-400 text-sm uppercase mb-1">Recomendação de Pneu</p>
            
            <div id="tire-recommendation" class="flex flex-col items-center justify-center">
                <h2 id="tire-type" class="text-4xl font-bold text-gray-500 text-glow">A CARREGAR</h2>
                <p id="tire-desc" class="text-sm text-gray-400 mt-1 text-center leading-tight">A iniciar ligação...</p>
            </div>
        </div>

        <!-- Indicador de Chuva -->
        <div id="rain-warning" class="mt-3 text-center bg-blue-600/30 border border-blue-500 text-blue-200 p-1 rounded hidden animate-pulse">
            <p class="text-sm">🌧️ Chuva Detetada</p>
        </div>

        <!-- Log de Debug Aumentado (h-48 = 192px, com scroll vertical) -->
        <div id="debug-log" class="mt-3 text-gray-400 h-48 overflow-y-auto leading-tight bg-black/80 p-2 rounded border border-gray-700">
            > Pronto para ligar...<br>
        </div>

    </div>

    <script>
        // Elementos UI
        const elTrackTemp = document.getElementById('track-temp');
        const elTrackWetness = document.getElementById('track-wetness');
        const elTireType = document.getElementById('tire-type');
        const elTireDesc = document.getElementById('tire-desc');
        const elOverlayBox = document.getElementById('tire-overlay');
        const elRainWarning = document.getElementById('rain-warning');
        const elConnectionStatus = document.getElementById('connection-status');
        const elDebugLog = document.getElementById('debug-log');

        let ws;
        let reconnectTimeout;
        let currentTry = 0;

        // ==========================================
        // PRODUTIZAÇÃO: LER DADOS DO URL (LINK)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const userIp = urlParams.get('ip') || '127.0.0.1'; 
        const userPort = urlParams.get('port') || '8855';

        // Lista de URLs a tentar dinamicamente (adicionei mais alguns caminhos comuns de API)
        const endpoints = [
            `ws://${userIp}:${userPort}/`,
            `ws://${userIp}:${userPort}/ws`,
            `ws://${userIp}:${userPort}/api`,
            `ws://${userIp}:${userPort}/stream`,
            `ws://${userIp}:${userPort}/telemetry`
        ];

        function logDebug(msg) {
            console.log(msg);
            // Insere a nova mensagem no topo do log
            elDebugLog.innerHTML = `> ${msg}<br>${elDebugLog.innerHTML}`;
        }

        // NOVO: Escutar eventos de injeção direta de dados (postMessage)
        // Alguns Overlays injetam a telemetria na WebView sem usar WebSockets
        window.addEventListener('message', function(event) {
            try {
                const payload = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                const telemetry = payload.data ? payload.data : payload; 
                
                if (telemetry && (telemetry.TrackTemp !== undefined || telemetry.TrackWetness !== undefined)) {
                    // Se recebemos via window message, fechamos o WebSocket para não gastar recursos
                    if (ws) ws.close();
                    clearTimeout(reconnectTimeout);
                    elConnectionStatus.className = 'w-3 h-3 rounded-full bg-green-500';
                    logDebug("Dados recebidos via PostMessage!");
                    processRealTelemetry(telemetry);
                }
            } catch (error) {
                // Ignorar eventos de message que não sejam nossos
            }
        });

        function connectWebSocket() {
            elConnectionStatus.className = 'w-3 h-3 rounded-full bg-yellow-500 animate-pulse';
            
            const urlToTry = endpoints[currentTry % endpoints.length];
            elTireDesc.textContent = `A tentar: ${urlToTry}`;
            logDebug(`A tentar ligar a: ${urlToTry}`);

            try {
                ws = new WebSocket(urlToTry);
            } catch (e) {
                logDebug(`Exceção: ${e.message}`);
                scheduleReconnect();
                return;
            }

            ws.onopen = function() {
                logDebug(`SUCESSO! Ligado a ${urlToTry}`);
                elConnectionStatus.className = 'w-3 h-3 rounded-full bg-green-500 animate-pulse';
                elTireDesc.textContent = "Ligado! A aguardar telemetria...";
                clearTimeout(reconnectTimeout);
            };

            ws.onmessage = function(event) {
                try {
                    const payload = JSON.parse(event.data);
                    const telemetry = payload.data ? payload.data : payload; 
                    
                    if (telemetry.TrackTemp !== undefined || telemetry.TrackWetness !== undefined) {
                        processRealTelemetry(telemetry);
                    } else {
                        // Opcional: Descomentar abaixo se quiseres ver os dados todos no log (pode causar lag)
                        // logDebug(`Recebido pacote vazio/sem info de pista.`);
                    }
                } catch (error) {
                    // Ignora erros de parse
                }
            };

            ws.onclose = function() {
                logDebug(`Ligação fechada (${urlToTry}). A tentar o próximo...`);
                elConnectionStatus.className = 'w-3 h-3 rounded-full bg-red-500';
                currentTry++; 
                scheduleReconnect();
            };

            ws.onerror = function(error) {
                logDebug(`Erro WS (${urlToTry}).`);
            };
        }

        function scheduleReconnect() {
            clearTimeout(reconnectTimeout);
            reconnectTimeout = setTimeout(connectWebSocket, 3000);
        }

        const WETNESS_STATES = {
            0: "Desconhecido", 1: "Seco", 2: "Quase Seco", 
            3: "Lig. Húmido", 4: "Húmido", 5: "Mod. Molhado", 
            6: "Muito Molhado", 7: "Ext. Molhado"
        };

        function processRealTelemetry(telemetry) {
            const trackTemp = telemetry.TrackTempCrew !== undefined ? telemetry.TrackTempCrew : telemetry.TrackTemp;
            const wetnessRaw = telemetry.TrackWetness; 
            const precipitation = telemetry.Precipitation || 0;

            if (wetnessRaw === undefined) return;

            let wetnessEnum = 0;
            if (typeof wetnessRaw === 'string') {
                const wStr = wetnessRaw.toLowerCase();
                if (wStr.includes('dry')) wetnessEnum = 1;
                else if (wStr.includes('damp') || wStr.includes('húmido')) wetnessEnum = 3;
                else if (wStr.includes('wet') || wStr.includes('molhado')) wetnessEnum = 6;
                else wetnessEnum = 1;
            } else {
                wetnessEnum = wetnessRaw;
            }

            const isRaining = precipitation > 0.01;

            elTrackTemp.textContent = trackTemp ? `${trackTemp.toFixed(1)}°C` : '--°C';
            elTrackWetness.textContent = typeof wetnessRaw === 'string' ? wetnessRaw : (WETNESS_STATES[wetnessEnum] || "Desconhecido");

            if (isRaining) {
                elRainWarning.classList.remove('hidden');
            } else {
                elRainWarning.classList.add('hidden');
            }

            if (wetnessEnum <= 2) {
                setTireUI('SLICKS', 'Pista em boas condições.', 'text-yellow-400', 'border-yellow-400');
            } else if (wetnessEnum === 3 || wetnessEnum === 4) {
                if (isRaining) {
                    setTireUI('WETS EM BREVE', 'A piorar, sê cauteloso.', 'text-orange-400', 'border-orange-400');
                } else {
                    setTireUI('CUIDADO (SLICKS)', 'Partes húmidas, a secar.', 'text-orange-400', 'border-orange-400');
                }
            } else if (wetnessEnum >= 5) {
                setTireUI('WET TIRES', 'Obrigatório pneus de chuva.', 'text-blue-400', 'border-blue-500');
            }
            
            // Ocultar ecrã de log se os dados já estão a fluir para não tapar a visão do jogador
            elDebugLog.style.display = 'none';
        }

        function setTireUI(type, desc, colorClass, borderClass) {
            elTireType.textContent = type;
            elTireDesc.textContent = desc;
            elTireType.className = `text-4xl font-bold text-glow ${colorClass}`;
            elOverlayBox.className = `overlay-container rounded-r-xl p-4 w-72 transition-all duration-500 ease-in-out border-l-4 flex flex-col ${borderClass}`;
        }

        connectWebSocket();
    </script>
</body>
</html>
