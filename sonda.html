<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRacing Tire Overlay (Engenharia Reversa)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');
        html, body {
            font-family: 'Teko', sans-serif;
            background: rgba(0, 0, 0, 0) !important;
            color: white;
            overflow: hidden; margin: 0; padding: 1rem;
        }
        .overlay-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            border-left: 4px solid #3b82f6;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .text-glow { text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
        #debug-log {
            font-family: monospace; font-size: 11px;
            scrollbar-width: thin; scrollbar-color: #4b5563 transparent;
        }
    </style>
</head>
<body class="flex items-start justify-start h-screen">

    <div id="tire-overlay" class="overlay-container rounded-r-xl p-4 w-72 transition-all duration-500 ease-in-out border-l-4 border-purple-500 flex flex-col">
        
        <div class="flex justify-between items-center mb-3 border-b border-gray-600 pb-2">
            <h1 class="text-2xl font-bold tracking-widest text-purple-400 uppercase">Scanner API</h1>
            <div id="connection-status" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse" title="A pesquisar..."></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-gray-800/50 p-2 rounded">
                <p class="text-gray-400 text-sm uppercase">Pista</p>
                <p id="track-temp" class="text-xl font-semibold">--°C</p>
            </div>
            <div class="bg-gray-800/50 p-2 rounded">
                <p class="text-gray-400 text-sm uppercase">Estado</p>
                <p id="track-wetness" class="text-xl font-semibold text-blue-400">Aguardar...</p>
            </div>
        </div>

        <div class="mt-2 text-center p-3 rounded-lg bg-gray-800/80 border border-gray-600">
            <div id="tire-recommendation" class="flex flex-col items-center justify-center">
                <h2 id="tire-type" class="text-3xl font-bold text-gray-500 text-glow">À PROCURA DE DADOS</h2>
                <p id="tire-desc" class="text-sm text-gray-400 mt-1 text-center leading-tight">Sonda de Engenharia Reversa Ativa</p>
            </div>
        </div>

        <!-- Log de Debug Aumentado para podermos ler o que ele encontra -->
        <div id="debug-log" class="mt-3 text-green-400 h-64 overflow-y-auto leading-tight bg-black p-2 rounded border border-gray-700 break-words">
            > Inicializando sondas de memória...<br>
        </div>

    </div>

    <script>
        const elTrackTemp = document.getElementById('track-temp');
        const elTrackWetness = document.getElementById('track-wetness');
        const elTireType = document.getElementById('tire-type');
        const elTireDesc = document.getElementById('tire-desc');
        const elConnectionStatus = document.getElementById('connection-status');
        const elDebugLog = document.getElementById('debug-log');

        function logDebug(msg) {
            console.log(msg);
            elDebugLog.innerHTML = `> ${msg}<br>${elDebugLog.innerHTML}`;
        }

        let isConnected = false;

        // ==========================================
        // SONDAS DE ENGENHARIA REVERSA
        // ==========================================

        // SONDA 1: API Nativa Windows WebView2 (Muito provável em apps C#/.NET)
        if (window.chrome && window.chrome.webview) {
            logDebug("✔️ Motor WebView2 detetado! A injetar escuta...");
            window.chrome.webview.addEventListener('message', function(event) {
                if (!isConnected) {
                    logDebug("🚀 BINGO! Dados a entrar via WebView2 API.");
                    isConnected = true;
                    elConnectionStatus.className = 'w-3 h-3 rounded-full bg-green-500';
                }
                const payload = event.data;
                const telemetry = payload.data ? payload.data : payload;
                if (telemetry) tryProcessTelemetry(telemetry);
            });
        } else {
            logDebug("❌ WebView2 não detetado no ambiente.");
        }

        // SONDA 2: Eventos PostMessage Padrão (Usado no OBS e CEF)
        window.addEventListener('message', function(event) {
            if (!isConnected && event.data) {
                logDebug("🚀 BINGO! Dados a entrar via window.postMessage.");
                // Mostrar as chaves para vermos a estrutura do objeto que o Edge Overlays envia
                if (typeof event.data === 'object') {
                    logDebug("Chaves: " + Object.keys(event.data).join(', ').substring(0, 50) + "...");
                }
                isConnected = true;
                elConnectionStatus.className = 'w-3 h-3 rounded-full bg-green-500';
            }
            
            try {
                const payload = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                const telemetry = payload.data ? payload.data : payload;
                if (telemetry) tryProcessTelemetry(telemetry);
            } catch (e) {}
        });

        // SONDA 3: Vasculhar a memória global da página de segundo a segundo
        // Algumas apps simplesmente injetam uma variável como "window.iracing" ou "window.telemetry"
        setInterval(() => {
            if (isConnected) return;
            
            const suspectKeys = Object.keys(window).filter(k => 
                k.toLowerCase().includes('iracing') || 
                k.toLowerCase().includes('edge') || 
                k.toLowerCase().includes('telemetry')
            );
            
            if (suspectKeys.length > 0 && !window.alreadyLoggedSuspects) {
                logDebug("⚠️ OBJETOS INJETADOS NA MEMÓRIA ENCONTRADOS: " + suspectKeys.join(', '));
                window.alreadyLoggedSuspects = true;
                
                // Se encontrarmos, tentamos ler
                suspectKeys.forEach(key => {
                    if (window[key] && typeof window[key] === 'object') {
                        tryProcessTelemetry(window[key]);
                    }
                });
            }
        }, 2000);

        // ==========================================
        // LÓGICA DE DADOS
        // ==========================================

        const WETNESS_STATES = {
            0: "Desconhecido", 1: "Seco", 2: "Quase Seco", 
            3: "Lig. Húmido", 4: "Húmido", 5: "Mod. Molhado", 
            6: "Muito Molhado", 7: "Ext. Molhado"
        };

        function tryProcessTelemetry(telemetry) {
            // Tentar descobrir em que campo o Edge Overlays esconde a informação
            const trackTemp = telemetry.TrackTempCrew !== undefined ? telemetry.TrackTempCrew : (telemetry.TrackTemp !== undefined ? telemetry.TrackTemp : null);
            const wetnessRaw = telemetry.TrackWetness !== undefined ? telemetry.TrackWetness : null; 

            // Se ainda não tivermos os dados chave, não processamos a UI, mas já sabemos que há ligação
            if (wetnessRaw === null && trackTemp === null) return;

            // Converter para estado legível
            let wetnessEnum = 0;
            if (typeof wetnessRaw === 'string') {
                const wStr = wetnessRaw.toLowerCase();
                if (wStr.includes('dry')) wetnessEnum = 1;
                else if (wStr.includes('damp') || wStr.includes('húmido')) wetnessEnum = 3;
                else if (wStr.includes('wet') || wStr.includes('molhado')) wetnessEnum = 6;
                else wetnessEnum = 1;
            } else {
                wetnessEnum = wetnessRaw;
            }

            // Atualizar UI
            elTrackTemp.textContent = trackTemp ? `${trackTemp.toFixed(1)}°C` : '--°C';
            elTrackWetness.textContent = typeof wetnessRaw === 'string' ? wetnessRaw : (WETNESS_STATES[wetnessEnum] || "Desconhecido");

            if (wetnessEnum <= 2) {
                setTireUI('SLICKS', 'Pista ok.', 'text-yellow-400');
            } else if (wetnessEnum === 3 || wetnessEnum === 4) {
                setTireUI('CUIDADO/WETS', 'Transição.', 'text-orange-400');
            } else if (wetnessEnum >= 5) {
                setTireUI('WET TIRES', 'Molhado.', 'text-blue-400');
            }
        }

        function setTireUI(type, desc, colorClass) {
            elTireType.textContent = type;
            elTireDesc.textContent = desc;
            elTireType.className = `text-4xl font-bold text-glow ${colorClass}`;
            elDebugLog.style.display = 'none'; // Esconder logs se estiver a funcionar perfeito!
        }

    </script>
</body>
</html>
